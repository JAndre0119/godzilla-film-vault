<!doctype html>
<html>
  <head>
    <title>Godzilla Film Vault</title>
    <meta name="description" content="A catalog of every Godzilla film ever made" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">🦖 Godzilla Film Vault</h1>
      <p class="subtitle">Every Godzilla film, from 1954 to today</p>
    </header>

    <div class="controls">
      <input type="text" id="search-input" placeholder="Search films..." oninput="handleSearch()" />
      <select id="era-filter" onchange="handleFilter()">
        <option value="All">All Eras</option>
        <option value="Showa">Showa (1954–1975)</option>
        <option value="Heisei">Heisei (1984–1995)</option>
        <option value="Millennium">Millennium (1999–2004)</option>
        <option value="Reiwa">Reiwa (2016–present)</option>
        <option value="Monsterverse">Monsterverse</option>
        <option value="Hollywood">Hollywood</option>
      </select>
    </div>

    <div id="card-container"></div>

    <!-- Hidden template card -->
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>Film Title</h2>
        <img src="" alt="Film Poster" />
        <p></p>
      </div>
    </div>

    <footer class="footer">
      <p>Data sourced from IMDb & Wikipedia</p>
    </footer>

    <script type="text/javascript" src="scripts.js"></script>
  </body>
</html>
